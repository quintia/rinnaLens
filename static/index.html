<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LogitLens Visualization</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xyflow/react@12/dist/style.css">
    <style>
      :root {
        --bg: linear-gradient(180deg, #f4f8fc 0%, #eef4fa 100%);
        --panel: rgba(255, 255, 255, 0.94);
        --panel-border: rgba(138, 158, 182, 0.2);
        --panel-strong: rgba(255, 255, 255, 0.98);
        --text: #16202c;
        --muted: #607286;
        --accent: #3f8cff;
        --accent-strong: #1d6feb;
        --line: rgba(132, 152, 177, 0.24);
      }
      body {
        font-family: "Hiragino Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      main {
        width: min(100%, 1800px);
        margin: 0;
        padding: 18px 18px 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-sizing: border-box;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      #controls {
        display: grid;
        gap: 10px;
        background: var(--panel);
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--panel-border);
        box-shadow: 0 8px 18px rgba(66, 94, 130, 0.06);
      }
      .field-row {
        display: grid;
        gap: 10px;
        grid-template-columns: minmax(0, 1fr);
      }
      @media (min-width: 768px) {
        .field-row {
          grid-template-columns: minmax(0, 1fr) auto;
          align-items: end;
        }
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .label-actions {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      label {
        font-weight: 600;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .example-link {
        appearance: none;
        border: 0;
        background: transparent;
        padding: 0;
        color: var(--accent-strong);
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 0.16em;
        box-shadow: none;
        transform: none;
      }
      .example-link:hover {
        filter: none;
        transform: none;
        color: #1558be;
      }
      .example-modal-content {
        width: min(90vw, 480px);
      }
      .example-modal-title {
        margin: 0 0 14px;
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
        padding-right: 32px;
      }
      .example-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .example-list-item {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(248, 251, 255, 0.96);
        cursor: pointer;
        font-size: 0.95rem;
        color: var(--text);
        text-align: left;
        width: 100%;
        box-shadow: none;
        transform: none;
        font-family: inherit;
        font-weight: 400;
        transition: background 0.14s, border-color 0.14s, color 0.14s;
      }
      .example-list-item:hover {
        background: rgba(63, 140, 255, 0.06);
        border-color: var(--accent);
        color: var(--accent-strong);
        filter: none;
        transform: none;
      }
      .button-row {
        display: flex;
        align-items: flex-end;
      }
      .button-row #submit {
        min-width: 132px;
        min-height: 48px;
        padding: 10px 18px;
        font-size: 0.95rem;
        font-weight: 700;
      }
      input {
        padding: 11px 13px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(248, 251, 255, 0.96);
        color: var(--text);
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 0.98rem;
      }
      button {
        padding: 10px 16px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #fff;
        font-size: 0.9rem;
        transition: transform 0.18s ease, filter 0.18s ease;
        box-shadow: 0 8px 18px rgba(63, 140, 255, 0.16);
      }
      button:hover {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }
      button:active {
        transform: translateY(0);
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(118, 186, 255, 0.14);
      }
      #status {
        min-height: 24px;
        color: var(--muted);
        padding: 0 6px;
        font-size: 0.92rem;
      }
      #result {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        gap: 8px;
      }
      #graph {
        width: 100%;
        flex: 1;
        min-height: 0;
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background: var(--panel-strong);
        box-shadow: 0 24px 60px rgba(66, 94, 130, 0.1);
      }
      #graph .react-flow {
        background:
          radial-gradient(circle at 18% 18%, rgba(63, 140, 255, 0.08), transparent 24%),
          radial-gradient(circle at 80% 82%, rgba(57, 181, 135, 0.08), transparent 26%),
          linear-gradient(180deg, #fbfdff 0%, #f4f8fc 100%);
      }
      #graph .react-flow__renderer,
      #graph .react-flow__pane,
      #graph .react-flow__viewport {
        border-radius: 22px;
      }
      #graph .react-flow__attribution {
        display: none;
      }
      #graph .react-flow__handle {
        opacity: 0;
        width: 1px;
        height: 1px;
        border: 0;
        pointer-events: none;
      }
      #graph .react-flow__controls {
        border: 1px solid var(--line);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.24);
        overflow: hidden;
      }
      #graph .react-flow__controls button {
        background: rgba(255, 255, 255, 0.98);
        border-bottom: 1px solid var(--line);
        color: var(--text);
        box-shadow: none;
      }
      #graph .react-flow__controls button:hover {
        background: rgba(244, 248, 252, 0.98);
      }
      .graph-empty {
        min-height: 0;
        height: 100%;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 0.95rem;
        letter-spacing: 0.04em;
      }
      #result-meta {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        flex-shrink: 0;
        margin-bottom: 12px;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 8px 12px;
        min-height: 38px;
        border-radius: 999px;
        background: rgba(244, 248, 252, 0.96);
        border: 1px solid var(--line);
        color: var(--text);
        font-size: 0.85rem;
      }
      #next-predict-btn {
        font-size: 0.85rem;
        padding: 8px 14px;
        background: linear-gradient(135deg, #4caf87 0%, #2e8b6e 100%);
        box-shadow: 0 6px 14px rgba(46, 139, 110, 0.18);
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(20, 30, 44, 0.28);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .modal.modal-active {
        display: flex;
      }
      .modal-content {
        position: relative;
        max-width: 90vw;
        max-height: 90vh;
        background: #ffffff;
        border-radius: 18px;
        padding: 24px;
        box-sizing: border-box;
        overflow: auto;
        box-shadow: 0 30px 70px rgba(66, 94, 130, 0.18);
        border: 1px solid var(--panel-border);
      }
      .modal-close {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(22, 32, 44, 0.08);
        color: var(--text);
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 20px;
        line-height: 1;
        padding: 0;
      }
      .modal-body {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        justify-content: center;
        align-items: stretch;
        min-width: 240px;
      }
      .modal-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        color: var(--text);
      }
      .modal-section h3 {
        margin: 0;
        font-size: 16px;
        text-align: center;
      }
      .attention-frame,
      .logits-list {
        width: min(72vw, 920px);
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(248, 251, 255, 1);
        padding: 14px;
        box-sizing: border-box;
      }
      .attention-frame {
        overflow: auto;
      }
      .attention-matrix-shell {
        display: grid;
        grid-template-columns: 104px minmax(0, 1fr);
        grid-template-rows: auto minmax(0, 1fr);
        gap: 8px;
        min-width: fit-content;
      }
      .attention-x-tokens {
        grid-column: 2;
        display: grid;
        gap: 4px;
      }
      .attention-y-tokens {
        grid-row: 2;
        display: grid;
        gap: 4px;
      }
      .attention-token {
        font-size: 11px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(132, 152, 177, 0.12);
        border-radius: 6px;
        padding: 4px 6px;
        box-sizing: border-box;
      }
      .attention-token-x {
        writing-mode: vertical-rl;
        text-orientation: mixed;
        min-height: 92px;
        text-align: left;
      }
      .attention-token-y {
        min-height: 28px;
        display: flex;
        align-items: center;
      }
      .attention-grid {
        display: grid;
        gap: 4px;
        min-width: 0;
      }
      .attention-cell {
        min-width: 28px;
        min-height: 28px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-variant-numeric: tabular-nums;
        color: #193047;
      }
      .attention-axis-labels {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 12px;
      }
      .logits-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .logits-row {
        display: grid;
        grid-template-columns: 36px minmax(120px, 1fr) minmax(160px, 2fr) minmax(140px, auto);
        gap: 10px;
        align-items: center;
      }
      .logits-rank {
        font-weight: 700;
        color: var(--muted);
      }
      .logits-token {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .logits-bar-shell {
        height: 14px;
        background: rgba(132, 152, 177, 0.12);
        border-radius: 999px;
        overflow: hidden;
      }
      .logits-bar {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #70a8ff 0%, #1d6feb 100%);
      }
      .logits-meta {
        color: var(--muted);
        font-size: 12px;
        text-align: right;
      }
      .modal-feedback {
        color: var(--text);
        font-size: 16px;
        text-align: center;
        width: 100%;
      }
      @media (max-width: 767px) {
        main {
          padding: 12px;
        }
        #controls {
          padding: 8px 10px;
          border-radius: 10px;
        }
        #graph {
          min-height: 0;
        }
        .button-row #submit {
          width: 100%;
          min-height: 44px;
        }
        .attention-frame,
        .logits-list {
          width: min(82vw, 920px);
        }
        .attention-matrix-shell {
          grid-template-columns: 88px minmax(0, 1fr);
        }
        .logits-row {
          grid-template-columns: 32px minmax(0, 1fr);
        }
        .logits-bar-shell {
          grid-column: 1 / -1;
        }
        .logits-meta {
          grid-column: 1 / -1;
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section id="controls">
        <div class="field-row">
          <div class="field">
            <div class="label-row">
              <label for="prompt">次の単語を予測します</label>
              <div class="label-actions">
                <button id="example-link" class="example-link" type="button" hidden>文例を見る</button>
                <button id="example-random-btn" class="example-link example-random-btn" type="button" hidden>文例からひとつ取り出す</button>
                <button id="clear-link" class="example-link" type="button">クリア</button>
              </div>
            </div>
            <input id="prompt" type="text" required>
          </div>
          <div class="button-row">
            <button id="submit" type="button">次を予測する</button>
          </div>
        </div>
      </section>

      <section id="status"></section>

      <section id="result" hidden>
        <div id="result-meta">
          <span class="tag" id="prompt-tag">入力:&nbsp;</span>
          <span class="tag" id="predict-tag">予測:&nbsp;</span>
          <button id="next-predict-btn" type="button" hidden>続きを予測</button>
        </div>
        <div id="graph"></div>
      </section>
    </main>
    <div id="exampleModal" class="modal">
      <div class="modal-content example-modal-content">
        <button type="button" class="modal-close" id="example-modal-close-btn">×</button>
        <h2 class="example-modal-title">クリックで入力されます</h2>
        <ul id="exampleList" class="example-list"></ul>
      </div>
    </div>
    <div id="imageModal" class="modal">
      <div id="modalContent" class="modal-content">
        <button type="button" class="modal-close" id="modal-close-btn">×</button>
        <div id="modalBody" class="modal-body"></div>
      </div>
    </div>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
