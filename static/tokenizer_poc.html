<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>rinna tokenizer PoC</title>
<style>
  body { font-family: monospace; padding: 2rem; background: #111; color: #eee; }
  textarea { width: 100%; height: 80px; background: #222; color: #eee; border: 1px solid #555; padding: 0.5rem; font-size: 1rem; }
  button { margin-top: 0.5rem; padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
  pre { background: #1e1e1e; padding: 1rem; border: 1px solid #444; overflow-x: auto; white-space: pre-wrap; }
  .status { color: #aaa; font-size: 0.85rem; margin: 0.5rem 0; }
  .ok { color: #6f6; }
  .err { color: #f66; }
</style>
</head>
<body>
<h2>rinna tokenizer PoC — 独自実装 (Unigram)</h2>

<div id="load-status" class="status">Loading tokenizer.json ...</div>

<textarea id="input" placeholder="日本語テキストを入力...">吾輩は猫である。名前はまだない。</textarea>
<br>
<button id="btn" disabled>Tokenize</button>

<h3>結果</h3>
<pre id="output">（ロード待ち）</pre>

<script type="module">
import { loadTokenizer } from '/static/js/tokenizer.js';

const statusEl = document.getElementById('load-status');
const outputEl = document.getElementById('output');
const btn = document.getElementById('btn');

let tokenizer = null;

async function init() {
  try {
    const t0 = performance.now();
    tokenizer = await loadTokenizer();
    const ms = (performance.now() - t0).toFixed(0);
    statusEl.innerHTML = `<span class="ok">✓ Loaded in ${ms}ms</span> — vocab: ${tokenizer.vocabSize}`;
    btn.disabled = false;
  } catch (e) {
    statusEl.innerHTML = `<span class="err">✗ ${e.message}</span>`;
    console.error(e);
  }
}

function tokenize() {
  const text = document.getElementById('input').value;
  if (!tokenizer || !text) return;

  const t0 = performance.now();
  const result = tokenizer.encode(text);
  const ms = (performance.now() - t0).toFixed(2);

  // 末尾スペース有り
  const resultWS = tokenizer.encode(text + ' ');

  outputEl.textContent = [
    `=== 入力: ${JSON.stringify(text)}`,
    `tokens : ${JSON.stringify(result.tokens)}`,
    `ids    : [${result.input_ids.join(', ')}]`,
    `count  : ${result.input_ids.length}`,
    ``,
    `=== 末尾スペース有り: ${JSON.stringify(text + ' ')}`,
    `tokens : ${JSON.stringify(resultWS.tokens)}`,
    `ids    : [${resultWS.input_ids.join(', ')}]`,
    `count  : ${resultWS.input_ids.length}`,
    ``,
    `decode : ${JSON.stringify(tokenizer.decode(result.input_ids))}`,
    `elapsed: ${ms}ms`,
  ].join('\n');
}

btn.addEventListener('click', tokenize);
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) tokenize();
});

init();
</script>
</body>
</html>
